name: CI

on:
  push:
    branches: [main, master, develop, fix_*]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch: {}
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: read

env:
  PIP_CACHE_DIR: ./.cache/pip
  PYTHONDONTWRITEBYTECODE: '1'
  PYTHONUNBUFFERED: '1'
  PIP_DEFAULT_TIMEOUT: '120'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Compile source
        run: |
          python -m compileall -q src

      - name: Run unit tests
        run: |
          pytest -q tests -m "not e2e"

      - name: Run e2e simulation tests
        if: matrix.python-version == '3.12'
        run: |
          pytest -q tests/e2e -m e2e

  docker-build:
    name: Docker multi-arch build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image without pushing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          provenance: false

  system-e2e-mongo:
    name: System e2e with MongoDB
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run system e2e tests with real MongoDB
        env:
          E2E_DB_BACKEND: real
          E2E_MONGO_URI: mongodb://127.0.0.1:27017
          E2E_MONGO_DB: finance_e2e_${{ github.run_id }}
        run: |
          pytest -q tests/e2e -m e2e
